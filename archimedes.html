<!DOCTYPE html>
<html lang="cs" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIMEDES: SIGMA PHYSICS DASHBOARD</title>

    <!-- SEO & Frameworks -->
    <meta name="description"
        content="Ultimátní interaktivní laboratoř pro Archimedův zákon s prvky gamifikace a Gen Alpha humoru.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --cyan: #22d3ee;
            --purple: #a855f7;
            --mango: #fbbf24;
            --bg: #020617;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Ultimátní Progress Bar */
        .xp-rail {
            background: #111827;
            border-radius: 50px;
            height: 24px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .xp-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--purple), #ec4899);
            background-size: 200% 200%;
            animation: gradientMove 3s linear infinite;
            border-radius: 50px;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Voda v kádince */
        .water-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
        }

        .water-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, rgba(34, 211, 238, 0.5), rgba(59, 130, 246, 0.8));
            transition: all 1s ease-in-out;
            backdrop-filter: blur(4px);
        }

        .water-layer.mango-mode {
            background: linear-gradient(180deg, rgba(251, 191, 36, 0.6), rgba(245, 158, 11, 0.9));
        }

        /* Badges */
        .badge {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: grayscale(1);
            opacity: 0.2;
        }

        .badge.unlocked {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.1);
            border-color: var(--cyan);
            background: rgba(34, 211, 238, 0.1);
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .terminal-text {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="p-4 lg:p-10">

    <!-- Header / Stats Panel -->
    <header class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
        <div class="lg:col-span-1 glass rounded-3xl p-6 flex items-center gap-5">
            <div class="relative">
                <div id="lvl-badge"
                    class="w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-4xl font-black shadow-lg">
                    1</div>
                <div
                    class="absolute -top-2 -right-2 bg-white text-black text-[10px] px-2 py-0.5 rounded-full font-bold">
                    ALPHA</div>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tighter uppercase">Physics <span
                        class="text-cyan-400">Rizzler</span></h1>
                <p id="rank-title" class="text-xs text-slate-400 font-mono italic">Lvl 1 Crook (No Aura)</p>
            </div>
        </div>

        <div class="lg:col-span-2 glass rounded-3xl p-6">
            <div class="flex justify-between items-end mb-3">
                <span class="text-xs font-bold uppercase tracking-widest text-cyan-500">Aura Strength (XP
                    Progress)</span>
                <span id="xp-val" class="font-mono text-sm">0 / 5000</span>
            </div>
            <div class="xp-rail">
                <div id="xp-bar" class="xp-bar"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- Levá strana: Simulátor -->
        <section class="lg:col-span-8 space-y-6">
            <div
                class="glass rounded-[48px] p-8 min-h-[700px] relative flex flex-col items-center justify-between overflow-hidden">

                <div class="absolute top-10 right-10 text-right opacity-20">
                    <p class="text-4xl font-black">HEURÉKA 2026</p>
                    <p class="font-mono text-xs italic">Experimental Physics Environment</p>
                </div>

                <!-- Kádinka -->
                <div
                    class="relative w-80 h-[450px] border-x-[12px] border-b-[12px] border-slate-700/50 rounded-b-[50px] z-10 shadow-inner">
                    <div class="water-container">
                        <div id="water" class="water-layer" style="height: 45%;">
                            <div class="absolute top-0 left-0 w-full h-1 bg-white/40"></div>
                        </div>
                    </div>

                    <!-- Testovací objekt -->
                    <div id="physics-obj"
                        class="absolute left-1/2 -translate-x-1/2 transition-all duration-1000 ease-in-out"
                        style="bottom: 400px;">
                        <div id="obj-emoji" class="text-9xl floating cursor-pointer">👑</div>
                        <div id="aura-glow" class="absolute inset-0 bg-cyan-400/20 blur-3xl rounded-full opacity-0">
                        </div>
                    </div>
                </div>

                <!-- Kontroly -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full z-20">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Materiál</label>
                        <select id="obj-select"
                            class="w-full bg-slate-900 border-none rounded-2xl p-4 text-xs font-bold ring-1 ring-white/10 outline-none focus:ring-2 focus:ring-cyan-500">
                            <option value="19300" data-emoji="👑">Crown (Gold)</option>
                            <option value="600" data-emoji="🪵">Log (Wood)</option>
                            <option value="920" data-emoji="🧊">Iceberg (Ice)</option>
                            <option value="0.5" data-emoji="🎈">Balloon (Helium)</option>
                            <option value="3510" data-emoji="💎">Diamond (Hard)</option>
                            <option value="7800" data-emoji="⚓">Anchor (Iron)</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Prostředí</label>
                        <select id="liq-select"
                            class="w-full bg-slate-900 border-none rounded-2xl p-4 text-xs font-bold ring-1 ring-white/10 outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="1000">H2O (Water)</option>
                            <option value="800">Oil (Slippery)</option>
                            <option value="13600">Mercury (Toxik Chad)</option>
                            <option value="999999">Mango Juice (Sigma)</option>
                        </select>
                    </div>
                    <button onclick="startExperiment()"
                        class="md:col-span-2 bg-white text-black font-black rounded-2xl hover:bg-cyan-400 transition-all active:scale-95 shadow-xl uppercase tracking-tighter mt-6">
                        Analyse Physics / Vibe Check
                    </button>
                </div>
            </div>

            <!-- Terminal -->
            <div class="glass rounded-3xl p-6 font-mono text-xs">
                <div class="flex gap-2 mb-3">
                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                    <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                </div>
                <div id="log" class="space-y-1 h-24 overflow-y-hidden text-slate-400">
                    <p class="text-cyan-400">> System Ready. Select parameters to begin.</p>
                </div>
            </div>
        </section>

        <!-- Pravá strana: Odznaky -->
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass rounded-[32px] p-8">
                <h3 class="text-xl font-bold mb-8 flex items-center justify-between">
                    <span>BADGES</span>
                    <span id="badge-count" class="text-xs bg-white/10 px-3 py-1 rounded-full">0/12</span>
                </h3>

                <div class="grid grid-cols-3 gap-4">
                    <!-- Odznaky 1-12 -->
                    <div id="badge-1" class="badge glass border rounded-2xl p-4 text-center" title="First Experiment">👶
                    </div>
                    <div id="badge-2" class="badge glass border rounded-2xl p-4 text-center" title="Sink it!">⚓</div>
                    <div id="badge-3" class="badge glass border rounded-2xl p-4 text-center" title="Stay Float">🪵</div>
                    <div id="badge-4" class="badge glass border rounded-2xl p-4 text-center" title="Mercury King">🧪
                    </div>
                    <div id="badge-5" class="badge glass border rounded-2xl p-4 text-center" title="Mango Alpha">🥭
                    </div>
                    <div id="badge-6" class="badge glass border rounded-2xl p-4 text-center" title="Up to Space">🎈
                    </div>
                    <div id="badge-7" class="badge glass border rounded-2xl p-4 text-center" title="Diamond Rizz">💎
                    </div>
                    <div id="badge-8" class="badge glass border rounded-2xl p-4 text-center" title="5000 XP Goal">🐐
                    </div>
                    <div id="badge-9" class="badge glass border rounded-2xl p-4 text-center" title="Water Specialist">💧
                    </div>
                    <div id="badge-10" class="badge glass border rounded-2xl p-4 text-center" title="Oil Spill">🛢️
                    </div>
                    <div id="badge-11" class="badge glass border rounded-2xl p-4 text-center" title="Sigma Scientist">🗿
                    </div>
                    <div id="badge-12" class="badge glass border rounded-2xl p-4 text-center" title="Ultimate Genius">🧠
                    </div>
                </div>
            </div>

            <!-- Stats Card -->
            <div class="glass rounded-[32px] p-8 border-t-4 border-cyan-500">
                <h4 class="font-bold text-xs uppercase tracking-widest text-slate-500 mb-6">Real-time Telemetry</h4>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-sm">Status:</span>
                        <span id="stat-status" class="text-xs font-bold text-green-400">IDLE</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm">Density Ratio:</span>
                        <span id="stat-ratio" class="font-mono text-xs">0.00%</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm">Total Rizz:</span>
                        <span id="stat-xp" class="text-cyan-400 font-bold italic">0 AUR</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // --- LOGIKA A ENGINE ---
        let state = {
            xp: parseInt(localStorage.getItem('arch_xp')) || 0,
            badges: JSON.parse(localStorage.getItem('arch_badges')) || [],
            isAnimating: false
        };

        const ranks = [
            "Lvl 1 Crook", "Beta Student", "Physics Skibidi", "Rizzler of Science",
            "Sigma Scientist", "Chad Researcher", "Aura Master", "Physics G.O.A.T",
            "Archimedes Alpha", "THE PHYSICS GOD"
        ];

        function addLog(msg, color = "text-slate-400") {
            const logBox = document.getElementById('log');
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `> ${msg}`;
            logBox.prepend(p);
        }

        function unlockBadge(id) {
            const badgeId = `badge-${id}`;
            if (!state.badges.includes(badgeId)) {
                state.badges.push(badgeId);
                const el = document.getElementById(badgeId);
                el.classList.add('unlocked');
                addLog(`UNLOCKED: ${el.title}!! 🔥`, "text-yellow-400");
                addXP(250);
                save();
                updateBadgeCount();
            }
        }

        function updateBadgeCount() {
            document.getElementById('badge-count').innerText = `${state.badges.length}/12`;
        }

        function addXP(amount) {
            state.xp += amount;
            if (state.xp > 5000) state.xp = 5000;

            const progress = (state.xp / 5000) * 100;
            gsap.to("#xp-bar", { width: progress + "%", duration: 1.5, ease: "expo.out" });
            document.getElementById('xp-val').innerText = `${state.xp} / 5000`;
            document.getElementById('stat-xp').innerText = `${state.xp} AUR`;

            const rankIdx = Math.min(Math.floor(state.xp / 500), ranks.length - 1);
            document.getElementById('rank-title').innerText = ranks[rankIdx];
            document.getElementById('lvl-badge').innerText = rankIdx + 1;

            if (state.xp >= 5000) unlockBadge(8);
            save();
        }

        function save() {
            localStorage.setItem('arch_xp', state.xp);
            localStorage.setItem('arch_badges', JSON.stringify(state.badges));
        }

        function startExperiment() {
            if (state.isAnimating) return;
            state.isAnimating = true;

            const rhoObj = parseFloat(document.getElementById('obj-select').value);
            const rhoLiq = parseFloat(document.getElementById('liq-select').value);
            const water = document.getElementById('water');
            const obj = document.getElementById('physics-obj');
            const status = document.getElementById('stat-status');
            const ratioStat = document.getElementById('stat-ratio');

            const ratio = rhoObj / rhoLiq;
            ratioStat.innerText = (ratio * 100).toFixed(2) + "%";

            // Mango Mode Logic
            if (rhoLiq === 999999) {
                water.classList.add('mango-mode');
                unlockBadge(5);
                addLog("MANGO BRAINROT ACTIVATED 🥭🗿", "text-orange-400");
            } else {
                water.classList.remove('mango-mode');
            }

            // Animace pozice
            let targetY = 0;
            let waterH = 45;

            if (rhoObj < 1) { // Helium balloon logic
                targetY = 550;
                waterH = 45;
                status.innerText = "AIRBORNE";
                status.className = "text-purple-400";
                unlockBadge(6);
                addLog("Object has negative aura, flying to Ohio 🎈");
            } else if (ratio > 1) { // Sinking
                targetY = 15;
                waterH = 65;
                status.innerText = "L + SINKING";
                status.className = "text-red-500";
                unlockBadge(2);
                addLog("Gravity is too sigma for this liquid ⚓");
            } else if (ratio < 1) { // Floating
                targetY = 220 - (ratio * 80);
                waterH = 55;
                status.innerText = "W + RIZZ";
                status.className = "text-cyan-400";
                unlockBadge(3);
                addLog("Buoyancy check passed. Stay floaty 🪵");
            } else { // Equilibrium
                targetY = 150;
                waterH = 60;
                status.innerText = "EQUILIBRIUM";
                status.className = "text-yellow-400";
                addLog("Perfectly balanced as all sigmas should be 🗿");
            }

            // GSAP Magic
            gsap.to(obj, { bottom: targetY, duration: 2, ease: "bounce.out", onComplete: () => { state.isAnimating = false; } });
            gsap.to(water, { height: waterH + "%", duration: 2 });
            gsap.to("#aura-glow", { opacity: 0.5, scale: 1.5, duration: 0.5, yoyo: true, repeat: 1 });

            // Badges trigger
            unlockBadge(1);
            if (rhoLiq === 13600) unlockBadge(4);
            if (rhoLiq === 1000) unlockBadge(9);
            if (rhoLiq === 800) unlockBadge(10);
            if (rhoObj === 3510) unlockBadge(7);
            if (state.badges.length >= 10) unlockBadge(11);
            if (state.badges.length === 11) unlockBadge(12);

            addXP(120);
        }

        // Init UI
        document.getElementById('obj-select').addEventListener('change', (e) => {
            const emoji = e.target.options[e.target.selectedIndex].dataset.emoji;
            document.getElementById('obj-emoji').innerText = emoji;
        });

        // Load progress
        state.badges.forEach(id => document.getElementById(id).classList.add('unlocked'));
        updateBadgeCount();
        addXP(0); // Trigger bars
    </script>
</body>

</html>
